<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Dashboard Arrendador</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/dashboardOwner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <!-- Hero section -->
        <div class="page-hero">
            <div class="page-hero-container">
                <h1>Dashboard Arrendador</h1>
                <p>Gestiona tus propiedades y revisa las solicitudes de arriendo</p>
            </div>
        </div>

        <div class="dashboard-container">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-info">
                        <h3 id="totalProperties">0</h3>
                        <p>Propiedades</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                    <div class="stat-info">
                        <h3 id="totalRequests">0</h3>
                        <p>Solicitudes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="acceptanceRate">0%</h3>
                        <p>Tasa de aceptación</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-star"></i></div>
                    <div class="stat-info">
                        <h3 id="avgRating">0.0</h3>
                        <p>Calificación</p>
                    </div>
                </div>
            </div>

            <!-- Actividad Reciente -->
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-clock"></i> Actividad Reciente</h2>
                </div>
                <div id="recentActivityList" class="activity-list">
                    <div class="empty-state">Cargando...</div>
                </div>
            </div>

            <!-- Solicitudes Recibidas -->
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-envelope"></i> Solicitudes Recibidas</h2>
                </div>
                <div id="requestsList" class="requests-list">
                    <div class="empty-state">Cargando...</div>
                </div>
            </div>

            <!-- Mis Propiedades -->
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-building"></i> Mis Propiedades</h2>
                    <a href="publishProperty.html" class="btn-primary">+ Publicar</a>
                </div>
                <div id="propertiesList" class="properties-grid">
                    <div class="empty-state">Cargando...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <!-- Modal de detalle de solicitud -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalle de solicitud</h3>
                <button class="modal-close" onclick="closeRequestModal()">&times;</button>
            </div>
            <div class="modal-body" id="requestModalBody"></div>
        </div>
    </div>

    <div class="toast-custom" id="notificationToast">
        <div class="toast-header">
            <i class="bi bi-check-circle-fill text-success"></i>
            <strong>Éxito</strong>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/headerfooter.js"></script>
    <script src="js/dashboardOwner.js"></script>
</body>
</html>
