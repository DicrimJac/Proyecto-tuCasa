<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Detalle Propiedad</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/detail.css?v=features-grid-1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
    <div id="header"></div>

    <main>
        <!-- HERO SECTION -->
        <div class="page-hero">
            <div class="page-hero-container">
                <h1>Detalle de Propiedad</h1>
                <p>Conoce todos los detalles de esta propiedad</p>
            </div>
        </div>

        <!-- CONTENEDOR PRINCIPAL -->
        <div class="detail-container">

            <!-- IMAGEN -->
            <div class="imagen-box">
                <img id="propertyImage" alt="Imagen propiedad">
            </div>

            <!-- INFORMACIÓN -->
            <div class="info-box">

                <!-- TÍTULO -->
                <h1 id="propertyTitle"></h1>

                <!-- PRECIO -->
                <div id="propertyPrice" class="precio"></div>

                <!-- UBICACIÓN -->
                <div class="ubicacion">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="propertyLocation"></span>
                </div>

                <!-- DATOS RÁPIDOS -->
                <div class="datos-grid">
                    <div class="dato-card">
                        <span>
                            <i class="fas fa-bed"></i>
                            Dormitorios
                        </span>
                        <strong id="bedrooms"></strong>
                    </div>

                    <div class="dato-card">
                        <span>
                            <i class="fas fa-bath"></i>
                            Baños
                        </span>
                        <strong id="bathrooms"></strong>
                    </div>

                    <div class="dato-card">
                        <span>
                            <i class="fas fa-car"></i>
                            Estacionamientos
                        </span>
                        <strong id="parkingSpaces"></strong>
                    </div>

                    <div class="dato-card">
                        <span>
                            <i class="fas fa-arrows-alt"></i>
                            Superficie
                        </span>
                        <strong id="propertyArea"></strong>
                    </div>

                    <div class="dato-card">
                        <span>
                            <i class="fas fa-building"></i>
                            Tipo propiedad
                        </span>
                        <strong id="propertyType"></strong>
                    </div>

                    <div class="dato-card">
                        <span>
                            <i class="fas fa-tag"></i>
                            Operación
                        </span>
                        <strong id="operationType"></strong>
                    </div>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="descripcion-box">
                    <h3>
                        <i class="fas fa-file-alt"></i>
                        Descripción
                    </h3>
                    <p id="propertyDescription"></p>
                </div>

                <div class="features-box" id="featuresBox" style="display: none;">
                    <h3>
                        <i class="fas fa-check-circle"></i>
Caracteristicas
                    </h3>
                    <div class="features-grid" id="propertyFeatures"></div>
                </div>

                <!-- BOTONES -->
                <div class="acciones">
                    <button id="requestRentButton" class="btn-request-rent">
                        <i class="fas fa-file-signature"></i>
                        Solicitar arriendo
                    </button>

                    <a href="search.html" class="btn-volver">
                        <i class="fas fa-arrow-left"></i>
                        Volver
                    </a>
                </div>
            </div>
        </div>

        <!-- MAPA -->
        <div class="mapa-section">
            <h3>
                <i class="fas fa-map-marked-alt"></i>
                Ubicación
            </h3>

            <div class="mapa">
                <iframe id="mapFrame"
                    width="100%"
                    height="350"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>
    <!-- TOAST -->
    <div class="toast-custom" id="notificationToast">
        <div class="toast-header">
            <i class="bi bi-info-circle-fill"></i>
            <strong>Información</strong>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/headerFooter.js?v=profile-backend-2"></script>
    <script src="js/detail.js?v=photos-render-1"></script>
</body>
</html>
