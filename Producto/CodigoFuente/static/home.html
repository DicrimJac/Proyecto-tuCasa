<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Casa · Inicio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="icon" type="image/png" href="assets/image/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body>
  <!-- HEADER (se carga dinámicamente) -->
  <div id="header"></div>
  <div id="profileContainer"></div>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <!-- CARRUSEL -->
    <div class="carousel">
      <div class="carousel-track">
        <div class="slide">
          <img src="assets/image/casa1.png" alt="Casa 1">
          <div class="slide-text">
            <p>Arriendos con información real</p>
            <a href="search.html" class="btn-slide">Explorar</a>
          </div>
        </div>
        <div class="slide">
          <img src="assets/image/casa2.png" alt="Casa 2">
          <div class="slide-text">
            <p>Arriendos con información real</p>
            <a href="search.html" class="btn-slide">Explorar</a>
          </div>
        </div>
        <div class="slide">
          <img src="assets/image/casa3.png" alt="Casa 3">
          <div class="slide-text">
            <p>Arriendos con información real</p>
            <a href="search.html" class="btn-slide">Explorar</a>
          </div>
        </div>
        <div class="slide">
          <img src="assets/image/casa4.png" alt="Casa 4">
          <div class="slide-text">
            <p>Arriendos con información real</p>
            <a href="search.html" class="btn-slide">Explorar</a>
          </div>
        </div>
        <div class="slide">
          <img src="assets/image/casa5.png" alt="Casa 5">
          <div class="slide-text">
            <p>Arriendos con información real</p>
            <a href="register.html" class="btn-slide">Explorar</a>
          </div>
        </div>
      </div>
      <button class="prev">❮</button>
      <button class="next">❯</button>
    </div>

    <!-- FILTROS AVANZADOS -->
    <div class="filters-section">
      <div class="filters-container">
        <div class="filter-group">
          <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
          <input type="text" id="filterLocation" placeholder="Ciudad, comuna o dirección" class="filter-input">
        </div>

        <div class="filter-group">
          <label><i class="fas fa-dollar-sign"></i> Precio</label>
          <div class="price-range">
            <input type="number" id="priceMin" placeholder="Mínimo" class="filter-input">
            <span>-</span>
            <input type="number" id="priceMax" placeholder="Máximo" class="filter-input">
          </div>
        </div>

        <div class="filter-group">
          <label><i class="fas fa-bed"></i> Habitaciones</label>
          <select id="filterRooms" class="filter-select">
            <option value="">Cualquiera</option>
            <option value="1">1 habitación</option>
            <option value="2">2 habitaciones</option>
            <option value="3">3 habitaciones</option>
            <option value="4">4 habitaciones</option>
            <option value="5">5+ habitaciones</option>
          </select>
        </div>

        <div class="filter-group">
          <label><i class="fas fa-bath"></i> Baños</label>
          <select id="filterBathrooms" class="filter-select">
            <option value="">Cualquiera</option>
            <option value="1">1 baño</option>
            <option value="2">2 baños</option>
            <option value="3">3 baños</option>
            <option value="4">4 baños</option>
            <option value="5">5+ baños</option>
          </select>
        </div>

        <div class="filter-group">
          <label><i class="fas fa-building"></i> Categoría</label>
          <select id="filterCategory" class="filter-select">
            <option value="">Todas</option>
            <option value="casa">Casa</option>
            <option value="departamento">Departamento</option>
            <option value="pieza">Pieza</option>
            <option value="suite">Suite</option>
            <option value="mansion">Mansión</option>
            <option value="bodega">Bodega</option>
          </select>
        </div>

        <div class="filter-group">
          <label><i class="fas fa-star"></i> Estado</label>
          <select id="filterCondition" class="filter-select">
            <option value="">Todos</option>
            <option value="nueva">Nueva</option>
            <option value="usada">Usada</option>
          </select>
        </div>

        <button id="searchBtn" class="search-btn">
          <i class="fas fa-search"></i> Buscar
        </button>
        <button id="clearFiltersBtn" class="clear-btn">
          <i class="fas fa-undo-alt"></i> Limpiar
        </button>
      </div>
    </div>

    <!-- PROPIEDADES DESTACADAS -->
    <section class="propiedades">
      <h2>Propiedades destacadas</h2>
      <div class="cards-container" id="propiedadesDestacadas">
        <!-- Las propiedades se cargarán dinámicamente -->
      </div>
    </section>

    <!-- ÚLTIMAS PROPIEDADES AGREGADAS -->
    <section class="ultimas">
      <h2>Últimas propiedades agregadas</h2>
      <div class="cards-container ultimas-container" id="ultimasPropiedades">
        <!-- Las propiedades se cargarán dinámicamente -->
      </div>
    </section>
  </main>

  <!-- FOOTER (se carga dinámicamente) -->
  <div id="footer"></div>

  <!-- Toast de notificaciones -->
  <div class="toast-custom" id="notificationToast">
    <div class="toast-header">
      <i class="bi bi-info-circle-fill"></i>
      <strong>Información</strong>
    </div>
    <div class="toast-body" id="toastMessage"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/headerFooter.js?v=profile-backend-2"></script>
  <script src="js/home.js?v=public-status-4"></script>
</body>
</html>
