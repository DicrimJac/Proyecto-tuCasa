<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Verificación</title>

</head>

<body>

    <script>
        // Función para cargar el HTML
        function cargarHTML() {
            fetch('home.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('menu-container').innerHTML = data;
                });
        }
        // Ejecutar al cargar la página
        window.onload = cargarHTML;


    </script>

</body>

</html>
