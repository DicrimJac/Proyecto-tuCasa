<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tu Casa · Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="login-card p-4 p-md-5">
                    <div class="card-header-custom text-center">
                        <div class="logo-container" style="margin-bottom: 0.5rem;">
                            <img src="assets/image/logo-tucasa.png" alt="Tu Casa Logo"
                                style="width: 250px; max-width: 80%; height: auto;"
                                onerror="this.style.display='none'; this.parentElement.querySelector('.fallback-logo').style.display='inline-block';">
                            <i class="bi bi-house-heart-fill fallback-logo"
                                style="display: none; font-size: 80px; color: #2C5A6E;"></i>
                        </div>
                    </div>

                    <form id="loginForm" novalidate>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="mailInput" placeholder="nombre@ejemplo.com"
                                autocomplete="email" required>
                            <label for="mailInput"><i class="bi bi-envelope-fill me-2"></i>Mail</label>
                            <div class="invalid-feedback" id="mailError">
                                Por favor ingresa un correo electrónico válido.
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña"
                                autocomplete="current-password" required>
                            <label for="passwordInput"><i class="bi bi-lock-fill me-2"></i>Contraseña</label>
                            <div class="invalid-feedback" id="passError">
                                La contraseña debe tener al menos 4 caracteres.
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberCheck"
                                    style="border-radius: 0.3rem; border-color:#bdd3df;">
                                <label class="form-check-label small text-secondary" for="rememberCheck">
                                    Mantener sesión iniciada
                                </label>
                            </div>
                            <a href="recover-password.html" class="text-decoration-none small"
                                style="color:#2C5A6E;">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-login w-100">
                            <i class="bi bi-arrow-right-circle me-2"></i> Continuar
                        </button>
                        <div class="text-center mb-3">
                            <p class="text-muted small">o continúa con</p>
                            <button type="button" id="googleLoginBtn" class="btn-google w-100">
                                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                                    <path fill="#FFC107"
                                        d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                                    <path fill="#FF3D00"
                                        d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                                    <path fill="#4CAF50"
                                        d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                                    <path fill="#1976D2"
                                        d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                                </svg>
                                Iniciar sesión con Google
                            </button>
                        </div>

                        <div id="loginMessage" class="mt-2" style="min-height: 20px;"></div>

                        <div class="divider my-2">
                            <span>¿Nuevo en Tu Casa?</span>
                        </div>
                        <div class="text-center">
                            <a href="register.html" id="createAccountBtn" class="create-account-link">
                                <i class="bi bi-person-plus-fill me-1"></i> Crear cuenta
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
