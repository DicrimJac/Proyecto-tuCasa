<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tu Casa · Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="login-card p-4 p-md-5">
                    <div class="card-header-custom text-center">
                        <!-- Logo - Espacio reducido -->
                        <div class="logo-container" style="margin-bottom: 0.5rem;">
                            <img src="images/logo-tucasa.png" alt="Tu Casa Logo" style="width: 250px; max-width: 80%; height: auto;" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
                            <i class="bi bi-house-heart-fill" style="display: none; font-size: 120px; color: #2C5A6E;"></i>

                    <form id="loginForm" novalidate>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="emailInput" placeholder="nombre@ejemplo.com" autocomplete="email" required>
                            <label for="emailInput"><i class="bi bi-envelope-fill me-2"></i>E-mail</label>
                            <div class="invalid-feedback" id="emailError">
                                Por favor ingresa un correo electrónico válido.
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" required>
                            <label for="passwordInput"><i class="bi bi-lock-fill me-2"></i>Contraseña</label>
                            <div class="invalid-feedback" id="passError">
                                La contraseña debe tener al menos 4 caracteres.
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberCheck" style="border-radius: 0.3rem; border-color:#bdd3df;">
                                <label class="form-check-label small text-secondary" for="rememberCheck">
                                    Mantener sesión iniciada
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small" style="color:#2C5A6E;">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-login w-100">
                            <i class="bi bi-arrow-right-circle me-2"></i> Continuar
                        </button>

                        <div id="loginMessage" class="mt-2" style="min-height: 20px;"></div>

                        <div class="divider my-2">
                            <span>¿Nuevo en Tu Casa?</span>
                        </div>
                        <div class="text-center">
                            <a href="#" id="createAccountBtn" class="create-account-link">
                                <i class="bi bi-person-plus-fill me-1"></i> Crear cuenta
                            </a>
                        </div>

                        <div class="footer-note text-center mt-2">
                            <i class="bi bi-shield-check"></i> Tus datos están protegidos
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('emailInput');
            const passwordInput = document.getElementById('passwordInput');
            const emailErrorDiv = document.getElementById('emailError');
            const passErrorDiv = document.getElementById('passError');
            const messageContainer = document.getElementById('loginMessage');
            
            function showMessage(msg, type = 'danger') {
                messageContainer.innerHTML = `
                    <div class="alert alert-${type} alert-custom d-flex align-items-center" role="alert" style="padding: 0.7rem 1rem;">
                        <i class="bi bi-${type === 'success' ? 'check-circle-fill' : (type === 'danger' ? 'exclamation-triangle-fill' : 'info-circle-fill')} me-2"></i>
                        <div>${msg}</div>
                    </div>
                `;
                setTimeout(() => {
                    const alertDiv = messageContainer.querySelector('.alert');
                    if (alertDiv) alertDiv.style.transition = 'opacity 0.3s';
                }, 10);
            }
            
            function clearMessage() {
                messageContainer.innerHTML = '';
            }
            
            function clearValidationStyles() {
                emailInput.classList.remove('is-invalid');
                passwordInput.classList.remove('is-invalid');
                emailInput.classList.remove('is-valid');
                passwordInput.classList.remove('is-valid');
                emailErrorDiv.style.display = 'none';
                passErrorDiv.style.display = 'none';
            }
            
            function validateEmailFormat(email) {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!email) return false;
                return emailRegex.test(email);
            }
            
            function validatePasswordStrength(pass) {
                if (!pass) return false;
                return pass.length >= 4;
            }
            
            function handleSubmit(event) {
                event.preventDefault();
                clearMessage();
                clearValidationStyles();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                let isValid = true;
                
                if (!email || !validateEmailFormat(email)) {
                    emailInput.classList.add('is-invalid');
                    emailErrorDiv.style.display = 'block';
                    isValid = false;
                } else {
                    emailInput.classList.add('is-valid');
                }
                
                if (!password || !validatePasswordStrength(password)) {
                    passwordInput.classList.add('is-invalid');
                    passErrorDiv.style.display = 'block';
                    isValid = false;
                } else {
                    passwordInput.classList.add('is-valid');
                }
                
                if (!isValid) {
                    showMessage('Revisa la contraseña (mínimo 4 caracteres).', 'danger');
                    return;
                }
                
                const submitBtn = document.getElementById('submitBtn');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Ingresando...';
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                    
                    const successAlert = messageContainer.querySelector('.alert-success');
                    if (successAlert) successAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 800);
            }
            
            form.addEventListener('submit', handleSubmit);
            
            const createBtn = document.getElementById('createAccountBtn');
            createBtn.addEventListener('click', (e) => {
                e.preventDefault();
                clearMessage();
                clearValidationStyles();
                emailInput.classList.remove('is-invalid', 'is-valid');
                passwordInput.classList.remove('is-invalid', 'is-valid');
                showMessage('Regístrate fácilmente. (Puedes probar cualquier email válido y pass >3 caracteres)', 'info');
                emailInput.focus();
            });
            
            emailInput.addEventListener('input', () => {
                if (messageContainer.innerHTML !== '') {
                    if (messageContainer.querySelector('.alert-danger') || messageContainer.querySelector('.alert-info')) {
                        clearMessage();
                    }
                }
                if (emailInput.classList.contains('is-invalid')) {
                    emailInput.classList.remove('is-invalid');
                    emailErrorDiv.style.display = 'none';
                }
            });
            
            passwordInput.addEventListener('input', () => {
                if (messageContainer.innerHTML !== '' && messageContainer.querySelector('.alert-danger')) {
                    clearMessage();
                }
                if (passwordInput.classList.contains('is-invalid')) {
                    passwordInput.classList.remove('is-invalid');
                    passErrorDiv.style.display = 'none';
                }
            });
            
            const forgotLink = document.querySelector('a[href="#"].small');
            if (forgotLink) {
                forgotLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    clearMessage();
                    showMessage('Enviamos un enlace de restablecimiento a tu correo electrónico.', 'info');
                });
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
