<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Cerrando sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/logout.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="login-card p-4 p-md-5 logout-card">
                    <div id="statusContent">
                        <!-- Estado inicial -->
                        <div id="initialState">
                            <div class="logout-icon">
                                <i class="bi bi-box-arrow-right"></i>
                            </div>
                            <h4 class="mb-3">¿Cerrar sesión?</h4>
                            <p class="text-secondary mb-4">¿Estás seguro de que deseas salir de tu cuenta?</p>
                            
                            <div class="option-buttons">
                                <button class="btn-outline-custom" id="cancelLogout">
                                    <i class="bi bi-x-lg me-2"></i>Cancelar
                                </button>
                                <button class="btn btn-login" id="confirmLogout">
                                    <i class="bi bi-check-lg me-2"></i>Cerrar sesión
                                </button>
                            </div>
                        </div>
                        
                        <!-- Cerrando sesión -->
                        <div id="loadingState" style="display: none;">
                            <div class="loader"></div>
                            <h5 class="mt-3">Cerrando sesión...</h5>
                            <p class="text-secondary small">Por favor espera</p>
                        </div>
                        
                        <!-- Sesión cerrada -->
                        <div id="successState" style="display: none;">
                            <div class="logout-icon">
                                <i class="bi bi-check-circle-fill" style="color: #1F3B4C;"></i>
                            </div>
                            <h5 class="mb-3">¡Sesión cerrada exitosamente!</h5>
                            <p class="text-secondary mb-4">Has salido de tu cuenta correctamente</p>
                            <div class="loader" style="width: 30px; height: 30px; border-width: 3px;"></div>
                            <p class="small text-secondary mt-3">Redirigiendo al inicio...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/logout.js"></script>
</body>
</html>
