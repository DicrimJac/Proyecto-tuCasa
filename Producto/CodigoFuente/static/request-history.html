<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Historial de Solicitudes</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/request-history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!-- HEADER (se carga dinámicamente) -->
    <div id="header"></div>

    <main>
        <!-- Hero section -->
        <div class="page-hero">
            <div class="page-hero-container">
                <h1>Historial de Solicitudes</h1>
                <p>Revisa el estado de tus solicitudes de arriendo</p>
            </div>
        </div>

        <div class="history-container">
            <!-- Filtros -->
            <div class="history-filters">
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Estado</label>
                    <select id="statusFilter">
                        <option value="todos">Todos</option>
                        <option value="pendiente">Pendientes</option>
                        <option value="aprobada">Aprobadas</option>
                        <option value="rechazada">Rechazadas</option>
                        <option value="finalizada">Finalizadas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-search"></i> Buscar</label>
                    <input type="text" id="searchFilter" placeholder="Buscar por propiedad...">
                </div>
                <button id="clearFiltersBtn" class="clear-filters">
                    <i class="fas fa-undo-alt"></i> Limpiar
                </button>
            </div>

            <!-- Lista de solicitudes -->
            <div class="requests-list" id="requestsList">
                <!-- Las solicitudes se cargarán dinámicamente -->
            </div>

            <!-- Empty state -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No tienes solicitudes</h3>
                <p>Aún no has realizado ninguna solicitud de arriendo</p>
                <a href="search.html" class="btn-explore">
                    <i class="fas fa-search"></i> Explorar propiedades
                </a>
            </div>

            <!-- Paginación -->
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Modal de detalles -->
    <div class="modal-detail" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalles de la solicitud</h3>
                <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <!-- Toast de notificaciones -->
    <div class="toast-custom" id="notificationToast">
        <div class="toast-header">
            <i class="bi bi-info-circle-fill"></i>
            <strong>Información</strong>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/headerfooter.js"></script>
    <script src="js/request-history.js"></script>
</body>
</html>
