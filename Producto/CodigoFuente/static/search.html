<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Buscar Propiedades</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <!-- HEADER (se carga dinámicamente) -->
    <div id="header"></div>

    <main>
        <!-- Hero section - ANCHO COMPLETO -->
        <div class="search-hero">
            <div class="search-hero-container">
                <h1>Buscar Propiedades</h1>
                <p>Encuentra la propiedad de tus sueños con nuestros filtros avanzados</p>
            </div>
        </div>

        <!-- Filtros de búsqueda -->
        <div class="filters-section">
            <div class="filters-container">
                <div class="filter-group">
                    <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                    <input type="text" id="filterLocation" placeholder="Ciudad, comuna o dirección" class="filter-input">
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-dollar-sign"></i> Precio</label>
                    <div class="price-range">
                        <input type="number" id="priceMin" placeholder="Mínimo" class="filter-input">
                        <span>-</span>
                        <input type="number" id="priceMax" placeholder="Máximo" class="filter-input">
                    </div>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-bed"></i> Habitaciones</label>
                    <select id="filterRooms" class="filter-select">
                        <option value="">Cualquiera</option>
                        <option value="1">1 habitación</option>
                        <option value="2">2 habitaciones</option>
                        <option value="3">3 habitaciones</option>
                        <option value="4">4 habitaciones</option>
                        <option value="5">5+ habitaciones</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-bath"></i> Baños</label>
                    <select id="filterBathrooms" class="filter-select">
                        <option value="">Cualquiera</option>
                        <option value="1">1 baño</option>
                        <option value="2">2 baños</option>
                        <option value="3">3 baños</option>
                        <option value="4">4 baños</option>
                        <option value="5">5+ baños</option>
                    </select>
                </div>

                <!-- NUEVO: Categoría (Tipo de propiedad) -->
                <div class="filter-group">
                    <label><i class="fas fa-building"></i> Categoría</label>
                    <select id="filterCategory" class="filter-select">
                        <option value="">Todas</option>
                        <option value="casa">Casa</option>
                        <option value="departamento">Departamento</option>
                        <option value="pieza">Pieza</option>
                        <option value="suite">Suite</option>
                        <option value="mansion">Mansión</option>
                        <option value="bodega">Bodega</option>
                    </select>
                </div>

                <!-- NUEVO: Estado (nueva/usada) -->
                <div class="filter-group">
                    <label><i class="fas fa-star"></i> Estado</label>
                    <select id="filterCondition" class="filter-select">
                        <option value="">Todos</option>
                        <option value="nueva">Nueva</option>
                        <option value="usada">Usada</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-tag"></i> Tipo</label>
                    <select id="filterType" class="filter-select">
                        <option value="">Todos</option>
                        <option value="arriendo">Arriendo</option>
                    </select>
                </div>

                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i> Buscar
                </button>
                <button id="clearFiltersBtn" class="clear-btn">
                    <i class="fas fa-undo-alt"></i> Limpiar
                </button>
            </div>
        </div>

        <!-- Resultados -->
        <div class="results-section">
            <div class="results-header">
                <h2>Propiedades encontradas</h2>
                <div class="results-count" id="resultsCount">0 propiedades</div>
                <div class="sort-options">
                    <label><i class="fas fa-sort"></i> Ordenar por:</label>
                    <select id="sortBy">
                        <option value="relevance">Relevancia</option>
                        <option value="price-asc">Precio: menor a mayor</option>
                        <option value="price-desc">Precio: mayor a menor</option>
                        <option value="rooms">Más habitaciones</option>
                    </select>
                </div>
            </div>

            <div class="properties-grid" id="propertiesGrid">
                <!-- Las propiedades se cargarán dinámicamente con JavaScript -->
            </div>

            <div class="pagination" id="pagination">
                <!-- Paginación dinámica -->
            </div>
        </div>
    </main>

    <!-- FOOTER (se carga dinámicamente) -->
    <div id="footer"></div>

    <!-- Toast de notificaciones -->
    <div class="toast-custom" id="notificationToast">
        <div class="toast-header">
            <i class="bi bi-info-circle-fill"></i>
            <strong>Información</strong>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/headerfooter.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
