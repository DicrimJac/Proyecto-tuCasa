<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Encuestas de Satisfacción</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/surveys.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <main>
        <div class="page-hero">
            <div class="page-hero-container">
                <h1>Encuestas de Satisfacción</h1>
                <p>Tu opinión nos ayuda a mejorar. ¡Cuéntanos tu experiencia!</p>
            </div>
        </div>

        <div class="surveys-container">
            <!-- Encuesta activa -->
            <div class="survey-card active-survey">
                <div class="survey-header">
                    <i class="fas fa-star"></i>
                    <h2>Encuesta de Satisfacción</h2>
                </div>
                <p class="survey-description">Ayúdanos a mejorar calificando tu experiencia en Tu Casa</p>
                
                <form id="surveyForm">
                    <!-- Pregunta 1 -->
                    <div class="question-group">
                        <label>1. ¿Qué tan fácil fue encontrar la propiedad que buscabas?</label>
                        <div class="rating-stars" data-question="1">
                            <i class="far fa-star" data-value="1"></i>
                            <i class="far fa-star" data-value="2"></i>
                            <i class="far fa-star" data-value="3"></i>
                            <i class="far fa-star" data-value="4"></i>
                            <i class="far fa-star" data-value="5"></i>
                        </div>
                        <input type="hidden" id="rating1" value="0">
                    </div>

                    <!-- Pregunta 2 -->
                    <div class="question-group">
                        <label>2. ¿Cómo calificas la atención recibida?</label>
                        <div class="rating-stars" data-question="2">
                            <i class="far fa-star" data-value="1"></i>
                            <i class="far fa-star" data-value="2"></i>
                            <i class="far fa-star" data-value="3"></i>
                            <i class="far fa-star" data-value="4"></i>
                            <i class="far fa-star" data-value="5"></i>
                        </div>
                        <input type="hidden" id="rating2" value="0">
                    </div>

                    <!-- Pregunta 3 -->
                    <div class="question-group">
                        <label>3. ¿Recomendarías Tu Casa a otros?</label>
                        <div class="rating-stars" data-question="3">
                            <i class="far fa-star" data-value="1"></i>
                            <i class="far fa-star" data-value="2"></i>
                            <i class="far fa-star" data-value="3"></i>
                            <i class="far fa-star" data-value="4"></i>
                            <i class="far fa-star" data-value="5"></i>
                        </div>
                        <input type="hidden" id="rating3" value="0">
                    </div>

                    <!-- Pregunta 4 -->
                    <div class="question-group">
                        <label>4. ¿Cómo calificas la calidad de la información de las propiedades?</label>
                        <div class="rating-stars" data-question="4">
                            <i class="far fa-star" data-value="1"></i>
                            <i class="far fa-star" data-value="2"></i>
                            <i class="far fa-star" data-value="3"></i>
                            <i class="far fa-star" data-value="4"></i>
                            <i class="far fa-star" data-value="5"></i>
                        </div>
                        <input type="hidden" id="rating4" value="0">
                    </div>

                    <!-- Pregunta 5 -->
                    <div class="question-group">
                        <label>5. ¿Qué tan probable es que uses nuestros servicios nuevamente?</label>
                        <div class="rating-stars" data-question="5">
                            <i class="far fa-star" data-value="1"></i>
                            <i class="far fa-star" data-value="2"></i>
                            <i class="far fa-star" data-value="3"></i>
                            <i class="far fa-star" data-value="4"></i>
                            <i class="far fa-star" data-value="5"></i>
                        </div>
                        <input type="hidden" id="rating5" value="0">
                    </div>

                    <!-- Comentario -->
                    <div class="question-group">
                        <label>Comentarios adicionales</label>
                        <textarea id="comments" rows="4" placeholder="Cuéntanos tu experiencia, sugerencias o quejas..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i> Enviar encuesta
                    </button>
                </form>
            </div>

            <!-- Historial de encuestas -->
            <div class="history-card">
                <h3><i class="fas fa-history"></i> Historial de encuestas</h3>
                <div id="surveysHistory" class="surveys-history">
                    <div class="history-empty">
                        <i class="fas fa-chart-simple"></i>
                        <p>Aún no has realizado ninguna encuesta</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <div class="toast-custom" id="notificationToast">
        <div class="toast-header">
            <i class="bi bi-info-circle-fill"></i>
            <strong>Información</strong>
        </div>
        <div class="toast-body" id="toastMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/headerfooter.js"></script>
    <script src="js/surveys.js"></script>
</body>
</html>
