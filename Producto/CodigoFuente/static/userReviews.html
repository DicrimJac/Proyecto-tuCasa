<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Casa · Mis Reseñas</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/userReviews.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    >
  </head>

  <body>
    <div id="header"></div>

    <main>
      <div class="page-hero">
        <div class="page-hero-container">
          <h1>Mis Reseñas</h1>
          <p>Revisa las evaluaciones asociadas a tu perfil y tus propiedades</p>
        </div>
      </div>

      <section class="reviews-dashboard">
        <div class="reviews-summary-grid">
          <article class="summary-card">
            <div class="summary-icon"><i class="fas fa-user-check"></i></div>
            <div>
              <h3 id="tenantAverage">0.0</h3>
              <p>Como arrendatario</p>
            </div>
          </article>

          <article class="summary-card">
            <div class="summary-icon"><i class="fas fa-key"></i></div>
            <div>
              <h3 id="landlordAverage">0.0</h3>
              <p>Como arrendador</p>
            </div>
          </article>

          <article class="summary-card">
            <div class="summary-icon"><i class="fas fa-building"></i></div>
            <div>
              <h3 id="propertyAverage">0.0</h3>
              <p>Mis propiedades</p>
            </div>
          </article>
        </div>

        <div class="reviews-tabs" role="tablist" aria-label="Tipos de reseñas">
          <button class="tab-button active" type="button" data-tab="all">
            Todas
          </button>
          <button class="tab-button" type="button" data-tab="tenant">
            Arrendatario
          </button>
          <button class="tab-button" type="button" data-tab="landlord">
            Arrendador
          </button>
          <button class="tab-button" type="button" data-tab="property">
            Propiedades
          </button>
        </div>

        <section class="reviews-panel">
          <div class="section-header">
            <h2><i class="fas fa-star"></i> Evaluaciones recibidas</h2>
            <span id="reviewsTotal">Cargando...</span>
          </div>

          <div id="reviewsList" class="reviews-list">
            <div class="empty-state">Cargando reseñas...</div>
          </div>
        </section>
      </section>
    </main>

    <div id="footer"></div>

    <div class="toast-custom" id="notificationToast">
      <div class="toast-header">
        <i class="bi bi-info-circle-fill"></i>
        <strong>Información</strong>
      </div>
      <div class="toast-body" id="toastMessage"></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="js/headerFooter.js?v=user-reviews-1"></script>
    <script src="js/userReviews.js?v=user-reviews-1"></script>
  </body>
</html>
